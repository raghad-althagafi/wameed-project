<!DOCTYPE html>
<html lang="ar" dir="rtl"> <!-- the language of the page and the direction of text -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- the width of page match the width of the device, initial scale of page when its loading -->
    <title>التنبؤ بالحرائق - وميض</title> <!-- title of page -->
    <link rel="stylesheet" href="../css/wameed.css"> <!-- import shared css file -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> <!-- import library for interactive maps -->
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            display: flex; /* make elements beside others*/
            flex-direction: row-reverse; /* direction from right to left */
            padding: 40px;
            gap: 40px; /* gap between elements */
            max-width: 1400px; /* maximum width for container */
            margin: 0 auto; /* align the container to center */
        }

        .left-section {
            width: 450px;
            display: flex; /* make elements beside others*/
            flex-direction: column; /* elements ordered in a column */
            gap: 20px; /* gap between elements */
            margin-top: 160px;
        }

        .right-section {
            flex: 1; /* take the rest of space */
            padding: 40px;
        }

        h1 {
            text-align: right;
            font-size: 40px;
            margin-bottom: 10px; /* space below the h1 */
            color: black;
            font-family: 'YearOfTheCamel', sans-serif;
            font-weight: bolder;
        }

        .subtitle {
            text-align: right;
            color: #666;
            font-size: 20px;
            margin-bottom: 30px; /* space below the subtitle */
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .map-button {
        width: 50%; /* the width is 50% of the container width */
        font-size: 17px;
        display: block;
        margin: 0 auto; /* align the map button to center */
        }

        .map-container {
            width: 100%; /* the width is 100% of the left section width */
            height: 450px;
            border-radius: 10px;
            overflow: hidden; /* hide the overflow of the map */
        }

        #map {
            width: 100%; /* the width is 100% of map container width */
            height: 100%; /* the height is 100% of map container height */
        }

        .predictions-header {
            text-align: right;
            color: #7BA697;
            font-size: 32px;
            margin-bottom: 15px;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .prediction-item {
            background-color: #EFEFEF;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .prediction-header {
            display: flex; /* make elements beside others */
            justify-content: space-between; /* space between elements */
            align-items: center; /* align items to center in prediction item element */
            margin-bottom: 10px; /* space below it */
        }

        .area-name {
            font-size: 25px;
            font-weight: bold;
            color: #333;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 17px;
            color: white;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .status-fire {
            background-color: #E43411;
        }

        .status-safe {
            background-color: #58AF63;
        }

        .prediction-date {
            color: #000000;
            font-size: 17px;
            margin-bottom: 3px; /* space below it */
            font-family: 'YearOfTheCamel', sans-serif;
        }

        /* Popup window style */
        .popup-overlay { 
            display: none; /* hide the popup */
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; /* it fit the entire page */
            background-color: rgba(0, 0, 0, 0.5); /* the background color is black and 0.5 transparency */
            z-index: 9999; /* above all elements */
            align-items: center;
            justify-content: center;
        }

        .popup-overlay.active {
            display: flex; /* the background appear when popup window opened */
        }


        .popup-header {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .popup-map {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            overflow: hidden; /* hide the overflow of the map */
            margin-bottom: 20px;
        }

        #popupMap {
            width: 100%;
            height: 100%;
        }


        .popup-buttons button {
            flex: 1; /* buttons have same width */
        }

        .message-popup-body {
            white-space: pre-line;
            text-align: right;
            font-size: 16px;
            line-height: 1.9;
            margin-bottom: 24px;
        }

        .popup-window {
            width: 450px;
            max-width: 90%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 28px 24px 24px;
        }

        .popup-buttons {
            display: flex; /* elements beside other */
            justify-content: center;
            margin-top: 8px;
        }

        .status-low {
            background-color: #f3c660;
        }

        .status-medium {
            background-color: #ee930a;
        }

        .status-high {
            background-color: #E43411;
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <div class="header-image"></div> 

    <!-- Navigation Bar -->
    <div id="navbar-container"></div>
    <script type="module" src="../js/navbar.js"></script>
    
    <!-- content of Predicted fires page -->
    <div class="container"> 
        <div class="left-section"> <!-- left section -->
            <!-- when its clicked the function openPopup() will be called-->
            <button class="main-button map-button" onclick="openPopup()">حدد المنطقة للتنبؤ</button> 
            
            <div class="map-container">
                <div id="map"></div> <!-- map -->
            </div>
        </div>

        <div class="right-section"> <!-- right section -->
            <h1>التنبؤ بالحرائق</h1> <!-- title -->
            <p class="subtitle">مدة التنبؤ: في الساعات 3–6 القادمة</p> <!-- subTitle -->
            <p class="subtitle">التنبؤ يأخذ بضع ثواني</p> <!-- subTitle -->

            <!-- list for predictions of today -->
            <div class="predictions-header">تنبؤات اليوم</div> <!-- title -->
            <div id="todayPredictions"></div> <!-- container for today's predictions -->

            <!-- list for previous predictions -->
            <div class="predictions-header" style="margin-top: 25px;">التنبؤات السابقة</div> <!-- title -->
            <div id="previousPredictions"></div> <!-- container for previous predictions -->
        </div>
    </div>

    <!-- Popup window -->
    <div class="popup-overlay" id="popupOverlay" onclick="closePopupOnOverlay(event)"> <!--the entire Popup window -->
        <!-- Popup window -->
        <div class="popup-window" onclick="event.stopPropagation()"> <!-- stop propagation of event to parent -->
            <div class="popup-header">حدد المنطقة</div>
            <div class="popup-map">
                <div id="popupMap"></div>
            </div>
            <div class="popup-buttons">
                <button class="main-button" onclick="closePopup()">إلغاء</button>
                <button class="main-button" onclick="definePrediction()">تحديد</button>
            </div>
        </div>
    </div>

    <!-- Popup window for alerts -->
    <div class="popup-overlay" id="messagePopupOverlay" onclick="closeMessagePopupOnOverlay(event)">
        <div class="popup-window" onclick="event.stopPropagation()">
            <div class="popup-header" id="messagePopupTitle">تنبيه</div>
            <div class="message-popup-body" id="messagePopupText"></div>
            <div class="popup-buttons">
                <button class="main-button" onclick="closeMessagePopup()">حسنًا</button>
            </div>
        </div>
    </div>

    <!--Footer Section-->
    <footer class="footer">
            <div class="footer-content">
                 <img src="../assets/images/wameed logo footer.svg" alt="Logo" style="margin-bottom: 8px;">

                <!-- copyright-->
                <p class="copyright">© 2026 وميض - جميع الحقوق محفوظة</p>
            </div>
    </footer>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <!-- import library for interactive maps -->
    <script type="module">
        import { getAuthToken } from "../js/auth.js";
        import { auth } from "../js/firebase-config.js";
        
        // initalize the map in varible map
        // L indicate leaflet library,and put the map in div that has the id=map
        // and the lan and lat is at riyadh, 5 indicate the zoom of the map
        const map = L.map('map').setView([24.7136, 46.6753], 5); 
        // bring the layer of map from openstreetmap
        // addTo(map) we add the layer to map
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // function to determine the prediction status style and text
        function getPredictionStatus(pred) {
            // get the risk level
            const level = String(pred?.riskLevel || "").toLowerCase().trim();

            if (level === "high") {
                return {
                    badgeClass: "status-high",
                    badgeText: "خطر حريق مرتفع",
                    markerColor: "#E43411"
                };
            }

            else if (level === "medium") {
                return {
                    badgeClass: "status-medium",
                    badgeText: "خطر حريق متوسط",
                    markerColor: "#ee930a"
                };
            }

            else if (level === "low") {
                return {
                    badgeClass: "status-low",
                    badgeText: "خطر حريق منخفض",
                    markerColor: "#f3c660"
                };
            }

            // fallback for any unknown status
            return {
                badgeClass: "status-safe",
                badgeText: "غير محدد",
                markerColor: "#999999"
            }

        }


        // function to create prediction item in HTML list
        function renderPredictionItem(pred) {
            // create div element for prediction item
            const item = document.createElement('div');
            item.className = 'prediction-item'; 

            // // determine the badge class and text based on fire status
            // const badgeClass = 'status-medium'; //pred.fire ? 'status-fire' : 'status-safe'; // choose red or green badge based on status
            // const badgeText = pred.riskLabelAr || 'خطر حريق متوسط'; // ? 'متنبأ بحدوث حريق' : 'غير متنبأ بحدوث حريق'; // badge text

            const status = getPredictionStatus(pred);

            // build the prediction item HTML structure
            item.innerHTML = `
                <div class="prediction-header">
                    <span class="area-name">${pred.name}</span>
                    <span class="status-badge ${status.badgeClass}">${status.badgeText}</span>
                </div>
                <div class="prediction-date">تاريخ التنبؤ: ${pred.date}</div>
                <div class="prediction-date">وقت التنبؤ: ${pred.time}</div>
            `;

            return item; // return the created prediction item
        }

        
        // ----------- Load predictions for user from backend DB ----------------
        
        const API_BASE = "http://127.0.0.1:5000"; // flask URL
        function getLocalDateString() {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const dd = String(d.getDate()).padStart(2, "0");
            return `${yyyy}-${mm}-${dd}`;
        }

        const currentDay = getLocalDateString();// date for today in normal format

        // array for today markers on map
        const todayMarkers = [];

        // function to convert date and time in ISO format 
        function toDateParts(iso) {
            if (!iso || isNaN(new Date(iso))) { // if ISO is null, isNaN invalid date
                console.warn("Invalid or missing date:", iso);
                return { date: "-", time: "-" }; // return -
            }

            const d = new Date(iso); // convert it Date Object
            // padStart(2, "0") to make it 2 digits
            const yyyy = d.getFullYear(); //get year
            const mm = String(d.getMonth() + 1).padStart(2, "0"); //get month, add 1 cause months from 0-11
            const dd = String(d.getDate()).padStart(2, "0"); //get day
            const hh = String(d.getHours()).padStart(2, "0"); //get hour
            const mi = String(d.getMinutes()).padStart(2, "0"); //get minutes

            // return date and time object in correct format
            return {
                date: `${yyyy}-${mm}-${dd}`,
                time: `${hh}:${mi}`
            };
        }

        // function to unify prediction row data from backend
        function mapRowToPrediction(row) {
            const iso = row.predicted_at || row.Predicted_at || row.predictedAt;
            const parts = toDateParts(iso); // convert it to separate date and time

            return {
                name: row.Area_name || "منطقة غير معروفة",
                lat: row.latitude ?? null,
                lng: row.Longitude ?? null,
                fire: row.is_Predicted === true,
                riskLevel: row.risk_level || "safe",
                probability: row.probability ?? null,
                date: parts.date,
                time: parts.time
            };
        }
        
        // claar today makeres from map
        // to prevent reputation of markers whenever page is refreshed
        function clearTodayMarkers() {
            todayMarkers.forEach(m => map.removeLayer(m)); // remover today markeres from array
            todayMarkers.length = 0;
        }

        // function to add today markers on map
        function addTodayMarkers(todayPredictions) {
            clearTodayMarkers(); // clear today markers

            // loop for today precidtiond
            todayPredictions.forEach(pred => {
                // skip this prediction if a value is missing
                if (
                    pred.lat == null || pred.lng == null ||
                    isNaN(Number(pred.lat)) || isNaN(Number(pred.lng))
                ) {
                    return;
                }

                const status = getPredictionStatus(pred);

                const icon = L.divIcon({
                    className: 'custom-marker',
                    // get the marker color depends on the status
                    html: `<div style="background-color: ${status.markerColor}; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                    iconSize: [20, 20]
                }); // create icon

                const marker = L.marker([pred.lat, pred.lng], { icon }).addTo(map); // add marker to map
                todayMarkers.push(marker); // push marker for today markers array
            });
        }

        // function to organize predictions to Today / previous
        function renderLists(predictions) {
            const todayContainer = document.getElementById('todayPredictions'); // coniatiner for today
            const previousContainer = document.getElementById('previousPredictions'); // coniatiner for previous

            // make them clear
            todayContainer.innerHTML = "";
            previousContainer.innerHTML = "";

            const todayPredictions = predictions.filter(p => p.date === currentDay); // filter today predictions
            const previousPredictions = predictions.filter(p => p.date !== currentDay); // filter previous pridctions

            if (todayPredictions.length === 0) { // if there is no predictions for today
                todayContainer.innerHTML = `<div class="prediction-date">لا توجد تنبؤات لليوم</div>`;
            } else { // if there are predictions for today
                todayPredictions.forEach(p => todayContainer.appendChild(renderPredictionItem(p))); // append today precitions in continer
            }

            if (previousPredictions.length === 0) { // if there are no previous predictions
                previousContainer.innerHTML = `<div class="prediction-date">لا توجد تنبؤات سابقة</div>`;
            } else { // if there are previous predictions
                previousPredictions.forEach(p => previousContainer.appendChild(renderPredictionItem(p))); // append previous precitions in continer
            }

            // add markers for today predictions
            addTodayMarkers(todayPredictions);
        }

        // function that load predictions from Backend
        async function loadPredictionsFromBackend() {
            try {
                // get Firebase token for backend authorization
                const token = await getAuthToken(true);

                // if there is no logged-in user
                if (!token) {
                    throw new Error("User is not logged in");
                }

                // send request to backend with Firebase token
                const res = await fetch(`${API_BASE}/api/predictions`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`); // check if response was successful
                // if not successful throw new error to catch

                const data = await res.json(); // convert response to JSON
                const predictions = (data.data || []).map(mapRowToPrediction); // check every row to ensure it appear proberly
                // display predictions in the page
                renderLists(predictions);
                
            } catch (err) {
                const todayContainer = document.getElementById('todayPredictions');
                const previousContainer = document.getElementById('previousPredictions');
                todayContainer.innerHTML = `<div class="prediction-date">تعذر تحميل التنبؤات</div>`; // problem from flask or CORS
                previousContainer.innerHTML = `<div class="prediction-date">تعذر تحميل التنبؤات</div>`;
                console.error(err);
            }
        }

        // load predictions when auth state is ready
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadPredictionsFromBackend();
            } else {

                // get containers
                const todayContainer = document.getElementById('todayPredictions');
                const previousContainer = document.getElementById('previousPredictions');

                // show message when user is not logged in
                todayContainer.innerHTML = `<div class="prediction-date">لا توجد تنبؤات لليوم</div>`;
                previousContainer.innerHTML = `<div class="prediction-date">لا توجد تنبؤات سابقة</div>`;
            }
        });

        
        let popupMap; // represent the map inside popup window
        let selectedMarker; // represent the marker 
        let selectedCoordinations = null; // represent the lan, lat that the user selects

        function openPopup() {
            document.getElementById('popupOverlay').classList.add('active'); // add class named 'acitve' for element with id popupOverlay
            setTimeout(() => {
                if (!popupMap) { // if we not initalize the map for popup window yet
                    // initalize the popupMap inside the div element that has the id popupMap
                    // and at the coordination of riyadh, and the zoom is 5
                    popupMap = L.map('popupMap').setView([24.7136, 46.6753], 5); 
                    // bring the layer of map from openstreetmap
                    // addTo(popupMap) we add the layer to map
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                    }).addTo(popupMap); 

                    // when the user click on the map, the function will be excuted
                    popupMap.on('click', function(e) {  // e represent the info about the event
                        selectedCoordinations = e.latlng; // return the coordinations that the user select
                        if (selectedMarker) { // if the selectedMarker has value which mean the user previosuly select coordinations in map
                            popupMap.removeLayer(selectedMarker); // remove the previous marker from map
                        }
                        // initalize the marker on map which it's name icon
                        const icon = L.divIcon({
                            className: 'custom-marker',
                            html: '<div style="background-color: #e67e50; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>',
                            iconSize: [20, 20]
                        });

                         // L indicate leaflet library
                        // add the marker on map at e.latlng coordinations
                        //  it has the style of icon varible
                        // assign the value of selectedMarker so we can remove it later from map if needed
                        selectedMarker = L.marker(e.latlng, { icon: icon }).addTo(popupMap);
                    });
                }
                popupMap.invalidateSize(); // update the size of map so it can appear correctly
            }, 100); // set Time out for 100ms so that the map appear correctly and without problems
        }

        // close the entire popup window
        function closePopup() {
            // remove the class named active from the element so the popup window will disappear
            document.getElementById('popupOverlay').classList.remove('active'); 
        }

        // when user click the backgroun of popup window, which will be closed
        function closePopupOnOverlay(event) {
            if (event.target.id === 'popupOverlay') { // if event target the element with id === 'popupOverlay'
                closePopup(); // call the function to close entire popup window
            }
        }

         // function called when user select تحديد button
        async function definePrediction() {
            // if user did not choose any point on popup map
            if (!selectedCoordinations) {
                openMessagePopup("تنبيه", "الرجاء تحديد موقع على الخريطة");
                return;
            }

            // default name if reverse geocoding does not return a place name
            let areaName = "موقع غير معروف";

            try {
                // send request to OpenStreetMap service to get area name from selected coordinates
                const geoRes = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&accept-language=ar&lat=${selectedCoordinations.lat}&lon=${selectedCoordinations.lng}`
                );

                // convert response to JSON
                const geoData = await geoRes.json();

                // if address exists, choose the best available place name
                if (geoData.address) {
                    areaName =
                        geoData.address.city ||
                        geoData.address.town ||
                        geoData.address.village ||
                        geoData.address.county ||
                        geoData.address.state ||
                        "موقع محدد";
                }
            } catch (e) {
                // if reverse geocoding fails, keep the default area name
                console.log("لم يتم جلب اسم الموقع");
            }

            // close popup window after location selection
            closePopup();

            try {
                // get Firebase token for backend authorization
                const token = await getAuthToken(true);

                // if there is no logged-in user
                if (!token) {
                    openMessagePopup("تنبيه", "يرجى تسجيل الدخول أولًا.");
                    return;
                }

                // run prediction using the user-selected coordinates
                const predictionRes = await fetch(`${API_BASE}/fire-prediction`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        lat: selectedCoordinations.lat,
                        lon: selectedCoordinations.lng
                    })
                });

                // convert prediction response to JSON
                const predictionData = await predictionRes.json();

                // print returned data in console for debugging
                console.log("predictionData:", predictionData);
                console.log("features:", predictionData.features);
                console.log("Selected latitude:", selectedCoordinations.lat);
                console.log("Selected longitude:", selectedCoordinations.lng);
                // console.log("probability:", predictionData.probability);

                // if backend response is not successful
                if (!predictionRes.ok) {
                    // if selected point is outside Saudi Arabia
                    if (predictionData.error === "outside_saudi") {
                        openMessagePopup("تنبيه", "نعتذر، الخدمة متوفرة داخل حدود المملكة العربية السعودية فقط.");
                        return;
                    }

                    // throw error for any other backend problem
                    throw new Error(predictionData.details || predictionData.message || `HTTP ${predictionRes.status}`);
                }

                // if selected point is outside forest scope
                if (predictionData.status === "outside_forest_scope") {
                    openMessagePopup("خارج نطاق التنبؤ", predictionData.message_ar);
                    return;
                }

                // if NDVI data is unavailable
                if (predictionData.status === "ndvi_unavailable") {
                    openMessagePopup("تعذر التنبؤ", predictionData.message_ar);
                    return;
                }

                // prepare prediction data to save in backend database
                const savePayload = {
                    area_name: areaName,
                    lat: selectedCoordinations.lat,
                    lng: selectedCoordinations.lng,
                    is_predicted: predictionData.is_predicted,
                    predicted_at: predictionData.predicted_at,
                    risk_level: predictionData.risk_level
                    // probability: predictionData.probability
                };

                // send request to save prediction in database
                const saveRes = await fetch(`${API_BASE}/api/predictions`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(savePayload)
                });

                // convert save response to JSON
                const saveData = await saveRes.json();

                // if save request failed
                if (!saveRes.ok) {
                    throw new Error(saveData.message || `HTTP ${saveRes.status}`);
                }

                // show popup message based on returned prediction level
                if (!predictionData.is_predicted) {
                    openMessagePopup(
                        "لا يوجد توقع لحدوث حريق",
                        `اسم المنطقة: ${areaName}`
                    );
                } else if (predictionData.risk_level === "high") {
                    openMessagePopup(
                        "خطر حريق مرتفع",
                        `اسم المنطقة: ${areaName}`
                    );
                } else if (predictionData.risk_level === "medium") {
                    openMessagePopup(
                        "خطر حريق متوسط",
                        `اسم المنطقة: ${areaName}`
                    );
                } else {
                    openMessagePopup(
                        "خطر حريق منخفض",
                        `اسم المنطقة: ${areaName}`
                    );
                }

                // reload predictions from backend after saving new prediction
                loadPredictionsFromBackend();

            } catch (error) {
                // print error in console and show popup error message
                console.error(error);
                openMessagePopup("خطأ", error.message || "حدث خطأ أثناء تنفيذ التنبؤ");
            }
        }

        // open the message popup and fill it with title and message text
        function openMessagePopup(title, message) {
            document.getElementById('messagePopupTitle').textContent = title;
            document.getElementById('messagePopupText').textContent = message;
            document.getElementById('messagePopupOverlay').classList.add('active');
        }

        // close the message popup
        function closeMessagePopup() {
            document.getElementById('messagePopupOverlay').classList.remove('active');
        }

        // close the message popup only when clicking on the background
        function closeMessagePopupOnOverlay(event) {
            if (event.target.id === 'messagePopupOverlay') {
                closeMessagePopup();
            }
        }

        // make functions accessible from HTML onclick
        window.openPopup = openPopup;
        window.closePopup = closePopup;
        window.closePopupOnOverlay = closePopupOnOverlay;
        window.definePrediction = definePrediction;
        window.closeMessagePopup = closeMessagePopup;
        window.closeMessagePopupOnOverlay = closeMessagePopupOnOverlay;
    </script>
</body>
</html>
