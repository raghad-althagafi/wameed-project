<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- the width of page match the width of the device, initial scale of page when its loading -->
    <link rel="stylesheet" href="../css/wameed.css"> <!-- import shared css file -->
    <title>تسجيل الدخول</title>
    
    
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            position: relative;
            color: #333;
        }

        /* back button */
        .back-button {
            position: absolute;
            top: 55px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        /* move button slightly when hovering */
        .back-button:hover {
            transform: translateX(-5px);
        }

        /* back con inside button */
        .back-icon {
            width: 60px;
            height: 60px;
        }

        /* logo */
        .logo-container {
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* main image */
        .logo-image {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        /* text logo */
        .text-logo {
            width: 220px;      
            height: auto;      
            margin-top: -6px;  
        }

        /* sign in card */
        .signin-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.08);
            padding: 50px 60px;
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            margin-top: 8px;
        }

        /* card title */
        .signin-title {
            font-size: 40px;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 45px;
            font-weight: 500;
        }

        /* form */
        .form-container {
            margin-bottom: 28px;
            text-align: right;
        }

        /* labels */
        .form-label {
            display: block;
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* input wrapper */
        .input-container {
            position: relative;
        }

        /* input icon */
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* input field */
        .form-input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background: #f5f5f5;
            direction: rtl;
            text-align: right;
            outline: none;
        }

        /* input focus effect */
        .form-input:focus {
            background: #efefef;
        }

        /* sign in button */
        .signin-button {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* hover animation */
        .signin-button:hover {
            background-color: #d14d28;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(232, 93, 51, 0.3);
        }

        /* sign up link */
        .signup-link {
            text-align: center;
            margin-top: 28px;
            font-size: 15px;
            color: #888;
        }

        .signup-link a {
            color: #d4704a;
            text-decoration: none;
            font-weight: 600;
        }

        /* error message */
        .error-text {
            display: none;
            margin-top: 8px;
            font-size: 14px;
            color: #ff4d4f;
        }

        /* when container has error class a red input appear */
        .form-container.error .form-input {
            border: 1px solid #ff4d4f;
            background: #fff;
        }

        /* show error message when error occur */
        .form-container.error .error-text {
            display: block;
        }

        /* popup overlay */
        .custom-popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        /* show popup overlay */
        .custom-popup-overlay.show {
            display: flex;
        }

        /* popup box */
        .custom-popup-box {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 22px;
            padding: 30px 26px 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            text-align: center;
        }

        /* popup title */
        .custom-popup-title {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* popup message */
        .custom-popup-message {
            font-size: 19px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 24px;
        }

        /* popup button */
        .custom-popup-button {
            min-width: 120px;
            padding: 12px 22px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        /* forgot password link container */
        .forgot-password-link {
            text-align: center;
            margin-top: 14px;
            margin-bottom: 14px;
        }

        /* forgot password link */
        .forgot-password-link a {
            color: #d4704a;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        /* forgot password link hover */
        .forgot-password-link a:hover {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- back icon -->
    <a href="home-page.html">
        <button class="back-button" title="العودة">
            <img  class="back-icon" src="../assets/images/back-icon.svg" alt="العودة">
        </button>
    </a>


    <div class="logo-container">
        <!-- logo -->
        <img class="logo-image" src="../assets/images/logo.png" alt="وميض" class="logo-image">  
        <!-- name -->
        <img class="text-logo" src="../assets/images/text logo.svg" alt="wameed logo" >
    </div>

    <div class="signin-card">
        <h2 class="signin-title">تسجيل الدخول</h2>
        
        <form id="signinForm">
            <!-- email -->
            <div class="form-container">
                <label class="form-label">البريد الإلكتروني</label>
                <div class="input-container"> 
                    <img class="input-icon" src="../assets/images/email-icon.svg" alt="الايميل">
                    <input type="email" class="form-input" placeholder="مثال: example@gmail.com" id="email">
                </div>
                <small class="error-text">البريد الإلكتروني مطلوب</small>
            </div>

            <!-- password -->
            <div class="form-container">
                <label class="form-label">كلمة المرور</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/pass-icon.svg" alt="الباسوورد">
                    <input type="password" class="form-input" placeholder="كلمة المرور" id="password">
                </div>
                <small class="error-text">فضلًا أدخل كلمة المرور للمتابعة.</small>
            </div>

            <!-- sign in button-->
            <button type="submit" class="submit-button signin-button">تسجيل الدخول</button>

            <!-- sign up link  -->
            <div class="signup-link">
                ليس لديك حساب؟ <a href="sign-up.html">سجّل الآن</a>
            </div>

            <!-- sforget password link  -->
            <div class="forgot-password-link">
                <a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
            </div>
        </form>
    </div>

    <!-- pop up menu to show sign-in and forgot-password messages -->
    <div id="signinPopup" class="custom-popup-overlay">
        <div class="custom-popup-box">
            <h3 id="signinPopupTitle" class="custom-popup-title">تنبيه</h3>
            <p id="signinPopupMessage" class="custom-popup-message"></p>
            <button id="signinPopupBtn" class="custom-popup-button">حسنًا</button>
        </div>
    </div>

    <script type="module">
        // import the sign-in function and forgot-password function from auth.js
        import { signinWithEmail, forgotPassword } from "../js/auth.js";

        // get the elemeents
        const signinPopup = document.getElementById('signinPopup');
        const signinPopupTitle = document.getElementById('signinPopupTitle');
        const signinPopupMessage = document.getElementById('signinPopupMessage');
        const signinPopupBtn = document.getElementById('signinPopupBtn');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');

        // function to show the popup with a custom title and message
        function showSigninPopup(title, message, onClose = null) {
            // set the title and messaage
            signinPopupTitle.textContent = title;
            signinPopupMessage.textContent = message;
            signinPopup.classList.add('show'); // show the popup

            // when the button clicked
            const closeHandler = () => {
                signinPopup.classList.remove('show'); // hide the popup
                signinPopupBtn.removeEventListener('click', closeHandler); // to avoid duplicate listeners
                if (onClose) onClose(); // run extra action after closing
            };

            // add click event to button
            signinPopupBtn.addEventListener('click', closeHandler);
        }

        // when forgot password is clicked
        forgotPasswordLink.addEventListener('click', async function (e) {
            e.preventDefault(); // stop link default behavior

            // get email from input
            const email = document.getElementById('email').value.trim();

            // if email is empty
            if (!email) {
                showSigninPopup('تنبيه', 'يرجى إدخال البريد الإلكتروني أولًا.');
                return;
            }

            try {
                await forgotPassword(email); // send reset password email
                showSigninPopup( // show success popup
                    'تم الإرسال',
                    'تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني. يرجى التحقق من البريد الوارد أو الرسائل غير المرغوب فيها.'
                );
            } catch (error) {
                // invalid email
                if (error.message.includes('auth/invalid-email')) {
                    showSigninPopup('خطأ', 'البريد الإلكتروني غير صالح.');
                // email not found    
                } else if (error.message.includes('auth/user-not-found')) {
                    showSigninPopup('خطأ', 'لا يوجد حساب مرتبط بهذا البريد الإلكتروني.');
                } else {
                    showSigninPopup('خطأ', error.message || 'حدث خطأ أثناء إرسال رابط إعادة التعيين');
                }
            }
        });

        //get the login form and listen for submit even
        document.getElementById('signinForm').addEventListener('submit', async function (e) {
            
            //prevent page reload when submitting the form
            e.preventDefault();

            //flag to check if there is any error
            let hasError = false;

            //loop through all form input to validate empty fields
            document.querySelectorAll('.form-container').forEach(container => {

                //get the input
                const input = container.querySelector('.form-input');

                //show error style if the input is sempty
                if (!input.value.trim()) {
                    container.classList.add('error');
                    hasError = true;
                } else {
                    //remove error style if filled
                    container.classList.remove('error');
                }
            });

            //stop the login process if any error exists
            if (hasError) return;

            //get the entered email and password
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                // sign in with email and password
                await signinWithEmail(email, password);
                // go to home page after successful sign in
                window.location.href = 'home-page.html#home';
            } catch (error) {
                // wrong email or password
                if (error.message.includes('auth/invalid-credential')) {
                    showSigninPopup('خطأ', 'البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                // account does not exist
                } else if (error.message.includes('auth/user-not-found')) {
                    showSigninPopup('خطأ', 'لا يوجد حساب مرتبط بهذا البريد الإلكتروني.');
                // wrong password
                } else if (error.message.includes('auth/wrong-password')) {
                    showSigninPopup('خطأ', 'كلمة المرور غير صحيحة.');
                } else {
                    showSigninPopup('خطأ', error.message || 'حدث خطأ أثناء تسجيل الدخول');
                }
            }
        });
</script>
</body>
</html>
