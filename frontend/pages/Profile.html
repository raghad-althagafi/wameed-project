<!DOCTYPE html>
<html lang="ar" dir="rtl"> <!-- the language of the page and the direction of text -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- the width of page match the width of the device, initial scale of page when its loading -->
    <title>الصفحة الشخصية - وميض</title> <!-- title of page -->
    <link rel="stylesheet" href="../css/wameed.css"> <!-- import shared css file -->
    
    <style>
        /* --- Profile Page Specific Styles --- */
        
        /* Centers the profile card vertically and horizontally */
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh; /* Takes up most of the screen height */
            padding: 40px;
        }

        /* The main white card holding user info */
        .profile-card {
            background-color: #EFEFEF;
            width: 100%;
            max-width: 750px;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Soft shadow */
        }

        /* Circular container for the user icon */
        .profile-icon {
            width: 100px;
            height: 100px;
            background-color: #D9D9D9;
            border-radius: 50%;
            margin: 0 auto 20px; /* Centers the icon */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-title {
            font-size: 30px;
            font-weight: 800; 
            margin-bottom: 40px;
            color: black;
        }

        /* --- Info Rows (Label + Input) --- */
        .info-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            justify-content: center;
            gap: 20px; /* Space between the label and the input box */
        }

        .info-label {
            font-size: 20px;
            font-weight: 700;
            width: 140px; /* Fixed width to ensure all inputs align perfectly */
            text-align: left; /* Aligns text towards the input box */
            color: black;
            margin: 0;
        }

        .info-input {
            flex: 1; /* Allows input to fill remaining space */
            background-color: #F5F5F5;
            border: 1px solid #CCC;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            text-align: right;
            color: #333;
            max-width: 500px;
            font-family: var(--font-main); /* Inherit font from shared CSS */
        }

        /* Action Buttons */
        .profile-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        /* Unified style for all buttons inside the div to ensure equal size */
        .profile-buttons button {
            width: 180px; /* Fixed width to ensure matching sizes */
            padding: 12px 0; /* Remove side padding since width is set */
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-family: var(--font-main);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        /* Specific colors for each button */
        .btn-edit {
            background-color: #EC5A2F; 
        }
        
        .btn-logout {
            background-color: #E43411; 
        }
        
        /* Unified hover effect */
        .profile-buttons button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <div class="header-image"></div> 

    <!-- Navigation Bar -->
    <div id="navbar-container"></div>
    <script type="module" src="../js/navbar.js"></script>

    <!-- content of Profile page -->
    <main class="profile-container">
        <div class="profile-card">
            <div class="profile-icon">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 16.66 14.67 14 12 14Z" fill="#888"/>
                </svg>
            </div>

            <h1 class="profile-title">الصفحــة الشـخصـيـة</h1>

            <div class="info-group">
                <label class="info-label">الاسم:</label>
                <input type="text" id="display-name" class="info-input" value="" readonly>
            </div>

            <div class="info-group">
                <label class="info-label">البريد الإلكتروني:</label>
                <input type="email" id="display-email" class="info-input" value="" readonly dir="ltr">
            </div>

            <div class="info-group">
                <label class="info-label">كلمة المرور:</label>
                <input type="password" id="display-pass" class="info-input" value="********" readonly dir="ltr">
            </div>

            <div class="profile-buttons">
                <button class="btn-edit" onclick="window.location.href='Edit-Profile.html'">
                    <span>✎</span>تعديـل</button>
                <button class="btn-logout" onclick="logoutUser()">تسجيـل الخروج</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
            <div class="footer-content">
                
                <!-- logo -->
                 <img src="../assets/images/wameed logo footer.svg" alt="Logo" style="margin-bottom: 8px;">

                <!-- copyright-->
                <p class="copyright">© 2026 وميض - جميع الحقوق محفوظة</p>
            </div>
    </footer>

    <script type="module">
        // import Firebase auth instance
        import { auth } from "../js/firebase-config.js";

        // Import shared helper functions from auth.js
        import { logoutUser, getAuthToken } from "../js/auth.js";

        const API_BASE = "http://127.0.0.1:5000"; // backend base URL

        // load current user profile data from backend
        async function loadProfile() {
            try {
                // Get Firebase token for the current logged-in user
                const token = await getAuthToken(true);

                // Redirect to sign-in page if no user is authenticated
                if (!token) {
                    window.location.href = "sign-in.html";
                    return;
                }

                // request current profile data from backend
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                const data = await response.json(); // Convert backend response to JSON

                // Stop if backend returns an error
                if (!response.ok || !data.ok) {
                    throw new Error(data.error || "Failed to load profile");
                }

                // fill name field with the value from backend
                document.getElementById("display-name").value = data.user.User_name || "";
                
                // fill email field with the value from backend
                document.getElementById("display-email").value = data.user.User_email || "";

            } catch (error) {
                console.error("Error loading profile:", error);
                alert("تعذر تحميل بيانات الملف الشخصي");
            }
        }

        // logout the current user
        window.logoutUser = async function () {
            try {
                // sign out from Firebase and clear saved user data
                await logoutUser();

                // go back to home page after logout
                window.location.href = "home-page.html";
            } catch (error) {
                console.error("Logout error:", error);
                alert("حدث خطأ أثناء تسجيل الخروج");
            }
        };

        // wait until Firebase finishes checking the auth state
        auth.onAuthStateChanged((user) => {
            if (user) {
                // if the user is authenticated, load profile data
                loadProfile();
            } else {
                // if there is no authenticated user, go to sign-in page
                window.location.href = "sign-in.html";
            }
        });

    </script>

</body>
</html>
