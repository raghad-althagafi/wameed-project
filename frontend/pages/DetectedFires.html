<!DOCTYPE html>
<html lang="ar" dir="rtl"> <!-- the language of the page and the direction of text -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- the width of page match the width of the device, initial scale of page when its loading -->
    <title>رصد الحرائق - وميض</title> <!-- title of page -->
    <link rel="stylesheet" href="../css/wameed.css"> <!-- import shared css file -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> <!-- import library for interactive maps -->
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            display: flex; /* make elements beside others*/
            flex-direction: row-reverse; /* direction from right to left */
            padding: 40px;
            gap: 40px; /* gap between elements */
            max-width: 1400px; /* maximum width for container */
            margin: 0 auto; /* align the container to center */
        }

        .left-section {
            width: 450px;
            display: flex; /* make elements beside others*/
            flex-direction: column; /* elements ordered in a column */
            gap: 20px; /* gap between elements */
            margin-top: 125px; 
        }

        .right-section {
            flex: 1; /* take the rest of space */
            padding: 40px;
        }

        h1 {
            text-align: right;
            font-size: 40px;
            margin-bottom: 30px; /* space below the h1 */
            color: black;
            font-family: 'YearOfTheCamel', sans-serif;
            font-weight: bolder;
        }

        .subtitle {
            text-align: right;
            color: #666;
            font-size: 20px;
            margin-bottom: 30px; /* space below the subtitle */
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .map-button {
            width: 50%; /* the width is 50% of the container width */
            font-size: 17px;
            display: block;
            margin: 0 auto; /* align the map button to center */
        }

        .map-container {
            width: 100%; /* the width is 100% of the left section width */
            height: 450px;
            border-radius: 10px;
            overflow: hidden; /* hide the overflow of the map */
        }

        #map {
            width: 100%; /* the width is 100% of map container width */
            height: 100%; /* the height is 100% of map container height */
        }

        .detections-header {
            text-align: right;
            color: #7BA697;
            font-size: 30px;
            margin-bottom: 15px;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .detection-item {
            background-color: #EFEFEF;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .detection-header {
            display: flex; /* make elements beside others */
            justify-content: space-between; /* space between elements */
            align-items: center; /* align items to center in prediction item element */
            margin-bottom: 10px; /* space below it */
        }

        .area-name {
            font-size: 25px;
            font-weight: bold;
            color: #333;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 17px;
            color: white;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .status-fire {
            background-color: #E43411;
        }

        .status-safe {
            background-color: #58AF63;
        }

        .detection-date {
            color: #000000;
            font-size: 17px;
            margin-bottom: 3px; /* space below it */
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .details-button {
            font-size: 16px;
            margin-top: 10px;
        }

        /* Popup window style */
        .popup-overlay { 
            display: none; /* hide the popup */
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; /* it fit the entire page */
            background-color: rgba(0, 0, 0, 0.5); /* the background color is black and 0.5 transparency */
            z-index: 9999; /* above all elements */
            align-items: center;
            justify-content: center;
        }

        .popup-overlay.active {
            display: flex; /* the background appear when popup window opened */
        }

        .popup-map {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            overflow: hidden; /* hide the overflow of the map */
            margin-bottom: 20px;
        }

        #popupMap {
            width: 100%;
            height: 100%;
        }

        .popup-buttons button {
            flex: 1; /* buttons have same width */
        }

        .popup-window {
            width: 450px;
            max-width: 90%;
            background: white;
            border-radius: 20px;
            overflow: hidden; /* hide any content that goes outside the popup edges */
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 28px 24px 24px;
        }

        .popup-header {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 22px;
            color: #333;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        .message-popup-body {
            white-space: pre-line;
            text-align: right;
            font-size: 16px;
            line-height: 1.9;
            margin-bottom: 24px;
        }

        .popup-buttons {
            display: flex; /* elements beside other */
            justify-content: center;
            margin-top: 8px;
        }

    </style>
</head>
<body>
    <!-- Header Section -->
    <div class="header-image"></div> 

    <!-- Navigation Bar -->
    <div id="navbar-container"></div>
    <script type="module" src="../js/navbar.js"></script>

    <!-- content of detected fires page -->
    <div class="container"> 
        <div class="left-section"> <!-- left section -->
            <!-- when its clicked the function openPopup() will be called-->
            <button class="main-button map-button" onclick="openPopup()">حدد المنطقة لرصد الحريق</button> 
            
            <div class="map-container">
                <div id="map"></div> <!-- map -->
            </div>
        </div>

        <div class="right-section"> <!-- right section -->
            <h1>رصد الحرائق</h1> <!-- title -->
            <p class="subtitle">الرصد يأخذ بضع ثواني</p> <!-- subTitle -->

            <!-- list for detections of today -->
            <div class="detections-header">رصد اليوم</div> <!-- title -->
            <div id="todayDetections"></div> <!-- container for today's detections -->

            <!-- list for previous detections -->
            <div class="detections-header" style="margin-top: 25px;">الرصد السابق</div> <!-- title -->
            <div id="previousDetections"></div> <!-- container for previous detections -->
        </div>
    </div>

    <!-- Popup window -->
    <div class="popup-overlay" id="popupOverlay" onclick="closePopupOnOverlay(event)"> <!--the entire Popup window -->
        <!-- Popup window -->
        <div class="popup-window" onclick="event.stopPropagation()"> <!-- stop propagation of event to parent -->
            <div class="popup-header">حدد المنطقة</div>
            <div class="popup-map">
                <div id="popupMap"></div>
            </div>
            <div class="popup-buttons">
                <button class="main-button" onclick="closePopup()">إلغاء</button>
                <button class="main-button" onclick="definePrediction()">تحديد</button>
            </div>
        </div>
    </div>

    <!-- Popup window for alerts -->
    <div class="popup-overlay" id="messagePopupOverlay" onclick="closeMessagePopupOnOverlay(event)">
        <div class="popup-window" onclick="event.stopPropagation()">
            <div class="popup-header" id="messagePopupTitle">تنبيه</div>
            <div class="message-popup-body" id="messagePopupText"></div>
            <div class="popup-buttons">
                <button class="main-button" onclick="closeMessagePopup()">حسنًا</button>
            </div>
        </div>
    </div>

    <!--Footer Section-->
    <footer class="footer">
            <div class="footer-content">
                <img src="../assets/images/wameed logo footer.svg" alt="Logo" style="margin-bottom: 8px;">

                <!-- copyright-->
                <p class="copyright">© 2026 وميض - جميع الحقوق محفوظة</p>
            </div>
    </footer>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <!-- import library for interactive maps -->
    <script type="module">
        import { getAuthToken } from "../js/auth.js"; //import functions
        import { auth } from "../js/firebase-config.js";

        const API_BASE = "http://127.0.0.1:5000";

        // -----------------------------
        // TEST MODE
        // -----------------------------
        const TEST_MODE = false; 

        //const TEST_POINT = {
        //    lat: 24.4709,
        //    lng: 39.6122,
        //    datetime: "2023-08-18T13:30:00+03:00"
        //};
        // -----------------------------------------------------------------------------
        
        const map = L.map('map').setView([24.7136, 46.6753], 5); 
        // bring the layer of map from openstreetmap
        // addTo(map) we add the layer to map
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        const now = new Date();
        const currentDay = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`; // get today date in YYYY-MM-DD format

        const todayMarkers = []; //today markers on map

        // function to create detection item in HTML list
        function renderDetectionItem(dect) {
            // create div element for detection item
            const item = document.createElement('div');
            item.className = 'detection-item'; 

            // determine the badge class and text based on fire status
            const badgeClass = dect.fire ? 'status-fire' : 'status-safe'; // choose red or green badge
            const badgeText = dect.fire ? 'تم رصد حريق' : 'لم يتم رصد حريق'; // badge text

            // build the detection item HTML structure
            item.innerHTML = `
                <div class="detection-header">
                    <span class="area-name">${dect.name}</span>
                    <span class="status-badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="detection-date">تاريخ الرصد: ${dect.date}</div>
                <div class="detection-date">وقت الرصد: ${dect.time}</div>
            `;

            // if fire detected then add details button
            if (dect.fire) { // if status of detection item == fire, then details button will be created for that item
                const button = document.createElement('button'); // create details button
                button.className = 'main-button details-button'; // same style for buttons
                button.textContent = 'التفاصيل'; // text of button

                button.onclick = function() { // when details button clicked
                    window.location.href = `Details.html?fire_id=${encodeURIComponent(dect.id)}`; // navigate to details page
                };

                item.appendChild(button); // add button to item
            }

            return item; // return the created element
        }

        // function to convert date and time in ISO format into seperate date and time 
        function toDateParts(iso) {
            if (!iso) { // if there is no date and time return -, -
                return { date: "-", time: "-" };
            }

            const d = new Date(iso); //create date object

            // if date parsing fails return placeholders
            if (isNaN(d)) {
                console.warn("Invalid detected date:", iso);
                return { date: "-", time: "-" };
            }

            const yyyy = d.getFullYear(); //get year
            const mm = String(d.getMonth() + 1).padStart(2, "0"); //get month, add 1 cause months from 0-11
            const dd = String(d.getDate()).padStart(2, "0"); //get day
            const hh = String(d.getHours()).padStart(2, "0"); //get hour
            const mi = String(d.getMinutes()).padStart(2, "0"); //get minutes

            // return date and time object in correct format
            return { date: `${yyyy}-${mm}-${dd}`, time: `${hh}:${mi}` };
        }

            // unifie detected fire data from backend
            function mapRowToDetection(row) {

                // detected_at which is date, time in ISO format
                const iso =
                row.detected_at ||
                row.Detected_At ||
                ((row.Date && row.Time) ? `${row.Date}T${row.Time}:00Z` : null);

                const parts = toDateParts(iso); // convert ISO into normal format

                // return detection data object
                return {
                    id: row.Fire_ID || row.id || null, // document id from backend
                    name: row.Area_name || "منطقة غير معروفة", // support both field names
                    lat: row.latitude ?? row.Latitude ?? null, // support latitude or null
                    lng: row.longitude ?? row.Longitude ?? null, // support longitude variations
                    fire: !!(row.is_detected ?? row.Is_detected), // status of detection
                    date: parts.date,
                    time: parts.time
                };
            }

        // claar today makeres from map
        // to prevent reputation of markers whenever page is refreshed
        function clearTodayMarkers() {
            todayMarkers.forEach(m => map.removeLayer(m)); // remover today markeres from array
            todayMarkers.length = 0;
        }
        // function to add today markers on map
        function addTodayMarkers(todayDetections) {
            clearTodayMarkers();

            todayDetections.forEach(dect => {

                // check if coordinates are valid before creating marker
                if (
                    dect.lat == null ||
                    dect.lng == null ||
                    isNaN(Number(dect.lat)) ||
                    isNaN(Number(dect.lng))
                ) {
                    console.warn("Invalid detection coordinates:", dect);
                    return;
                }

                const icon = L.divIcon({
                    className: 'custom-marker',
                    // if dect.fire == true marker would be red, if its false marker would be green
                    html: `<div style="background-color: ${dect.fire ? '#E43411' : '#5cb85c'}; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                    iconSize: [20, 20]
                }); // create icon

                const marker = L.marker([Number(dect.lat), Number(dect.lng)], { icon }).addTo(map); // add marker to map
                todayMarkers.push(marker); // push marker for today markers array
            });
        }

        // function to organize detections to Today / previous
        function renderLists(detections) {
            const todayContainer = document.getElementById('todayDetections');
            const previousContainer = document.getElementById('previousDetections');

             // make them clear
            todayContainer.innerHTML = "";
            previousContainer.innerHTML = "";

            const todayDetections = detections.filter(d => d.date === currentDay); // filter today detections
            const previousDetections = detections.filter(d => d.date !== currentDay); // filter previous detections

            // if there is no detections for today
            if (todayDetections.length === 0) {
                todayContainer.innerHTML = `<div class="detection-date">لا توجد عمليات رصد لليوم</div>`;
            } else { // display today detctions
                todayDetections.forEach(d => todayContainer.appendChild(renderDetectionItem(d)));
            }
            // if there is no detections for previous
            if (previousDetections.length === 0) {
                previousContainer.innerHTML = `<div class="detection-date">لا توجد عمليات رصد سابقة</div>`;
            } else { // display previous detctions
                previousDetections.forEach(d => previousContainer.appendChild(renderDetectionItem(d)));
            }

            // add markers for today detections
            addTodayMarkers(todayDetections);
        }

        // function that load detections from Backend
        async function loadDetectionsFromBackend() {
            try {
                // encodeURIComponent to ensure USER_ID appear correctly in URL
                // get Firebase token for backend authorization
                const token = await getAuthToken(true); //get token for the user

                // if there is no logged-in user
                if (!token) {
                    throw new Error("User is not logged in");
                }

                // send request to backend with Firebase token to return user detections
                const res = await fetch(`${API_BASE}/api/detections`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`); // if not successful throw new error to catch

                const data = await res.json(); // convert response to JSON

                // unifie all detections data
                const detections = (data.data || []).map(row => {
                    return mapRowToDetection(row);
                }); // check every row to ensure it appear proberly

                // display all user detections in the page
                renderLists(detections);
            } catch (err) { // if there is an error
                const todayContainer = document.getElementById('todayDetections');
                const previousContainer = document.getElementById('previousDetections');
                todayContainer.innerHTML = `<div class="detection-date">تعذر تحميل الرصد</div>`;
                previousContainer.innerHTML = ``;
                console.error(err); //print the error
            }
        }

        //check if user logged in
        auth.onAuthStateChanged((user) => {
            if (user) { // if user logged in 
                loadDetectionsFromBackend(); //load user detections
            } else { // if user is not logged in 

                // get containers
                const todayContainer = document.getElementById('todayDetections');
                const previousContainer = document.getElementById('previousDetections');

                // show message when user is not logged in
                todayContainer.innerHTML = `<div class="detection-date">لا توجد عمليات رصد لليوم</div>`;
                previousContainer.innerHTML = `<div class="detection-date">لا توجد عمليات رصد سابقة</div>`;
            }
        });

        let popupMap; // represent the map inside popup window
        let selectedMarker; // represent the marker 
        let selectedCoordinations = null; // represent the lan, lat that the user selects

        function openPopup() {
            document.getElementById('popupOverlay').classList.add('active'); // add class named 'acitve' for element with id popupOverlay
            setTimeout(() => {
                if (!popupMap) { // if we not initalize the map for popup window yet
                    // initalize the popupMap inside the div element that has the id popupMap
                    // and at the coordination of riyadh, and the zoom is 5
                    popupMap = L.map('popupMap').setView([24.7136, 46.6753], 5); 
                    // bring the layer of map from openstreetmap
                    // addTo(popupMap) we add the layer to map
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                    }).addTo(popupMap); 

                    // when the user click on the map, the function will be excuted
                    popupMap.on('click', function(e) {  // e represent the info about the event
                        selectedCoordinations = e.latlng; // return the coordinations that the user select
                        if (selectedMarker) { // if the selectedMarker has value which mean the user previosuly select coordinations in map
                            popupMap.removeLayer(selectedMarker); // remove the previous marker from map
                        }
                        // initalize the marker on map which it's name icon
                        const icon = L.divIcon({
                            className: 'custom-marker',
                            html: '<div style="background-color: #e67e50; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>',
                            iconSize: [20, 20]
                        });

                        // L indicate leaflet library
                        // add the marker on map at e.latlng coordinations
                        //  it has the style of icon varible
                        // assign the value of selectedMarker so we can remove it later from map if needed
                        selectedMarker = L.marker(e.latlng, { icon: icon }).addTo(popupMap);
                    });
                }
                popupMap.invalidateSize(); // update the size of map so it can appear correctly
            }, 100); // set Time out for 100ms so that the map appear correctly and without problems
        }

        // close the entire popup window
        function closePopup() {
            // remove the class named active from the element so the popup window will disappear
            document.getElementById('popupOverlay').classList.remove('active'); 
        }

        // when user click the backgroun of popup window, which will be closed
        function closePopupOnOverlay(event) {
            if (event.target.id === 'popupOverlay') { // if event target the element with id === 'popupOverlay'
                closePopup(); // call the function to close entire popup window
            }
        }

        // get the area name from latitude and longitude using reverse geocoding
        async function reverseGeocode(lat, lng) {
            let areaName = "منطقة من اختيار المستخدم"; // default area name if no better name is found

            try {
                // send request to convert coordinates into a readable area name
                const geoRes = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&accept-language=ar&lat=${lat}&lon=${lng}`
                );

                // convert response to json
                const geoData = await geoRes.json();

                // if address information exists, choose the best available area name
                if (geoData.address) {
                    areaName =
                        geoData.address.city || geoData.address.town ||
                        geoData.address.village || geoData.address.county ||
                        geoData.address.state || "منطقة من اختيار المستخدم";
                }
            } catch {
                // if reverse geocoding fails, keep the default area name
                console.log("Reverse geocoding failed");
            }

            return areaName;
        }

        // ---------------- Detection function --------------------
        // function called when  user select 'تحديد' button
        async function definePrediction() {
            console.log("definePrediction started");

            if (!auth.currentUser) {
                // stop if no user is logged in
                openMessagePopup("تنبيه", "يرجى تسجيل الدخول أولًا.");
                return;
            }
            if (!TEST_MODE && !selectedCoordinations) { // if the user has not select the coordinations yet
                openMessagePopup("تنبيه", "الرجاء تحديد موقع على الخريطة");
                return;
            }

            const requestLat = TEST_MODE ? TEST_POINT.lat : selectedCoordinations.lat;
            const requestLng = TEST_MODE ? TEST_POINT.lng : selectedCoordinations.lng;
            const requestDatetime = TEST_MODE ? TEST_POINT.datetime : null;
            
            console.log("about to call /fire-detection", {
                lat: requestLat,
                lon: requestLng,
                datetime: requestDatetime
            });

            closePopup(); // close the location selection popup

            try {
                // get Firebase token for protected backend routes
                const token = await getAuthToken(true); 

                if (!token) {
                    throw new Error("User is not logged in");
                }

                const areaName = await reverseGeocode(requestLat, requestLng);
                const detectionPayload = {
                    lat: requestLat,
                    lon: requestLng,
                    datetime: requestDatetime
                };

                // send selected coordinates to backend
                const detectionRes = await fetch(`${API_BASE}/fire-detection`, {
                    method: "POST", headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}` },
                    body: JSON.stringify(detectionPayload)
                });

                // convert detection response to json
                const detection = await detectionRes.json();
                
                console.log("Temp/Humidity before save:", detection.temperature, detection.humidity);
                console.log("fire-detection response:", detection);

                // if the detection request failed handle the error
                if (!detectionRes.ok) {
                    // if the location is outside Saudi Arabia
                    if (detection.error === "outside_saudi") {
                        openMessagePopup("تنبيه", "نعتذر، الخدمة متوفرة داخل حدود المملكة العربية السعودية فقط.");
                        return;
                    } else {
                        // throw backend error message if available
                        throw new Error(detection.message || detection.error || "فشل التحليل");
                    }
                }

                const savePayload = {
                    lat: requestLat,
                    lng: requestLng,
                    area_name: areaName,
                    is_detected: detection.is_detected,
                    detected_at: detection.detected_at,
                    temperature: detection.temperature,
                    humidity: detection.humidity,
                    severity: detection.severity || null,
                    spread_direction: detection.spread_direction || null,
                    burned_area: detection.burned_area || null
                };
                console.log("savePayload:", savePayload);

                const saveRes = await fetch(`${API_BASE}/api/detections`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(savePayload)
                });

                // convert save response to json
                const saveResult = await saveRes.json();

                // show error if saving failed
                if (!saveRes.ok) {
                    throw new Error(saveResult.error || "Save failed");
                }
                
                // show success popup
                if (detection.is_detected) { // when a fire detected
                    openMessagePopup(
                        "تم رصد حريق",
                        `اسم المنطقة: ${areaName}\nالثقة: ${detection.fused_confidence}\nالمصدر الأساسي: ${detection.primary_source || "N/A"}\nالسبب: ${detection.decision_reason}`                    );
                } else {
                    openMessagePopup( // when no fire detected
                        "لم يتم تأكيد حريق",
                        `اسم المنطقة: ${areaName}\nالسبب: ${detection.decision_reason}`
                    );
                }

                // reload detections list after saving the new result
                await loadDetectionsFromBackend();

            } catch (error) {
                // handle any unexpected error
                console.error(error);
                openMessagePopup("خطأ", "حدث خطأ أثناء تحليل الحريق");
            }
        }

        // open the message popup and fill it with title and message text
        function openMessagePopup(title, message) {
            document.getElementById('messagePopupTitle').textContent = title;
            document.getElementById('messagePopupText').textContent = message;
            document.getElementById('messagePopupOverlay').classList.add('active');
        }

        // close the message popup
        function closeMessagePopup() {
            document.getElementById('messagePopupOverlay').classList.remove('active');
        }

        // close the message popup only when clicking on the background
        function closeMessagePopupOnOverlay(event) {
            if (event.target.id === 'messagePopupOverlay') {
                closeMessagePopup();
            }
        }

        // make functions accessible and visible from HTML onclick
        window.openPopup = openPopup;
        window.closePopup = closePopup;
        window.closePopupOnOverlay = closePopupOnOverlay;
        window.definePrediction = definePrediction;
        window.closeMessagePopup = closeMessagePopup;
        window.closeMessagePopupOnOverlay = closeMessagePopupOnOverlay;
    </script>
</body>
