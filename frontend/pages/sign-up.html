<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- the width of page match the width of the device, initial scale of page when its loading -->
    <link rel="stylesheet" href="../css/wameed.css"> <!-- import shared css file -->
    <title>إنشاء حساب</title>
    
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            position: relative;
            color: #333;
        }

        /* back button */
        .back-button {
            position: absolute;
            top: 55px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        /* move button slightly when hovering */
        .back-button:hover {
            transform: translateX(-5px);
        }

        /* back con inside button */
        .back-icon {
            width: 60px;
            height: 60px;
        }

        /* logo */
        .logo-container {
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* main image */
        .logo-image {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        /* text logo */
        .text-logo {
            width: 220px;      
            height: auto;      
            margin-top: -6px;  
        }

        /* sign up card */
        .signup-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.08);
            padding: 50px 60px;
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            margin-top: 8px;
            margin-bottom: 60px;
        }

        /* card title */
        .signup-title {
            font-size: 40px;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 45px;
            font-weight: 500;
        }

        /* form */
        .form-container {
            margin-bottom: 28px;
            text-align: right;
        }

        /* labels */
        .form-label {
            display: block;
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* input wrapper */
        .input-container {
            position: relative;
        }

        /* input icon */
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* input field */
        .form-input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background: #f5f5f5;
            direction: rtl;
            text-align: right;
            outline: none;
        }

        /* input focus effect */
        .form-input:focus {
            background: #efefef;
        }

        /* sign up button */
        .signup-button {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* hover animation */
        .signin-button:hover {
            background-color: #d14d28;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(232, 93, 51, 0.3);
        }

        /* sign in link */
        .signin-link {
            text-align: center;
            margin-top: 28px;
            font-size: 15px;
            color: #888;
        }

        .signin-link a {
            color: #d4704a;
            text-decoration: none;
            font-weight: 600;
        }

        /* error message */
        .error-text {
            display: none;
            margin-top: 8px;
            font-size: 14px;
            color: #ff4d4f;
        }

        /* when container has error class a red input appear */
        .form-container.error .form-input {
            border: 1px solid #ff4d4f;
            background: #fff;
        }

        /* show error message when error occur */
        .form-container.error .error-text {
            display: block;
        }

        /* password strength container */
        .password-strength {
            display: none;
            margin-top: 8px;
        }

        /* bar background */
        .strength-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        /* moving colored bar */
        .strength-bar span {
            display: block;
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        /* weak password color */
        .strength-weak {
            background: #ff4d4f;
        }

        /* medium password color */
        .strength-medium {
            background: #f4b400;
        }

        /* strong password color */
        .strength-strong {
            background: #34a853;
        }

        /* hide the normal error text when showing password rules */
        .form-container.password-rule-error .error-text {
            display: none;
        }

        /* show password strength section when password rules are not complete */
        .form-container.password-rule-error .password-strength {
            display: block;
        }
    </style>
</head>
<body>

    <!-- back icon -->
    <a href="home-page.html">
        <button class="back-button" title="العودة">
            <img  class="back-icon" src="../assets/images/back-icon.svg" alt="العودة">
        </button>
    </a>
    

   <div class="logo-container">
        <!-- logo -->
        <img class="logo-image" src="../assets/images/logo.png" alt="وميض">  
        <!-- name -->
        <img class="text-logo" src="../assets/images/text logo.svg" alt="wameed logo" >
    </div>

    <div class="signup-card">
        <h2 class="signup-title">إنشاء حساب</h2>
        
        <form id="signupForm">
            <!-- name -->
            <div class="form-container">
                <label class="form-label">الاسم</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/user-icon.svg" alt="المستخدم">
                    <input type="text" class="form-input" placeholder="الاسم الكامل" id="name">
                </div>
                <small class="error-text">فضلًا أدخل اسمك للمتابعة.</small>
            </div>

            <!-- email -->
            <div class="form-container">
                <label class="form-label">البريد الإلكتروني</label>
                <div class="input-container"> 
                    <img class="input-icon" src="../assets/images/email-icon.svg" alt="الايميل">
                    <input type="email" class="form-input" placeholder="مثال: example@gmail.com" id="email">
                </div>
                <small class="error-text">البريد الإلكتروني مطلوب</small>
            </div>

            <!-- password -->
            <div class="form-container" id="passwordContainer">
                <label class="form-label">كلمة المرور</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/pass-icon.svg" alt="الباسوورد">
                    <input type="password" class="form-input" placeholder="كلمة المرور" id="password">
                </div>
                <!-- password validation -->
                <div class="password-strength">
                    <div class="strength-bar">
                        <span></span>
                    </div>
                    <small class="strength-text"></small>
                </div>
                <small class="error-text">فضلًا أدخل كلمة المرور للمتابعة.</small>
            </div>

            <!-- password -->
            <div class="form-container">
                <label class="form-label">تأكيد كلمة المرور</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/pass-icon.svg" alt="الباسوورد">
                    <input type="password" class="form-input" placeholder="تأكيد كلمة المرور" id="confirmPassword">
                </div>
                <small class="error-text">فضلًا أدخل كلمة المرور للمتابعة.</small>               
            </div>

            <!-- sign up button-->
            <button type="submit" class="signup-button">إنشاء الحساب</button>

            <!-- sign in link -->
            <div class="signin-link">
                لديك حساب بالفعل؟ <a href="sign-in.html">تسجيل الدخول</a>
            </div>
        </form>
    </div>
<script>
    // get the form element
    const form = document.getElementById('signupForm');

    // get all input fields
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');

    // get each input container to show or remove error styles
    const emailContainer = emailInput.closest('.form-container');
    const passwordContainer = document.getElementById('passwordContainer');
    const confirmPasswordContainer = confirmPasswordInput.closest('.form-container');
    const nameContainer = nameInput.closest('.form-container');

    // get password strength bar and text
    const strengthBar = passwordContainer.querySelector('.strength-bar span');
    const strengthText = passwordContainer.querySelector('.strength-text');

    // regex pattern for validating email format
    const emailPattern = /^(?!.*\.\.)([A-Za-z0-9._%+-]+)@([A-Za-z0-9-]+)\.([A-Za-z]{2,})(\.[A-Za-z]{2,})*$/;

    // email live validation
    emailInput.addEventListener('input', function () {
        // get email value without spaces at beginning or end
        const value = emailInput.value.trim();

        // if field is empty, remove error while typing
        if (!value) {
            emailContainer.classList.remove('error');
            return;
        }

        // if email format is wrong, show error message
        if (!emailPattern.test(value)) {
            emailContainer.classList.add('error');
            emailContainer.querySelector('.error-text').textContent =
                'صيغة البريد الإلكتروني غير صحيحة';
        } else {
            // remove error if email becomes valid
            emailContainer.classList.remove('error');
        }
    });

    
    // password validation
    passwordInput.addEventListener('input', function () {
        // get password value without outside spaces
        const value = passwordInput.value.trim();

        // check password conditions
        const hasUpperLower = /[A-Z]/.test(value) && /[a-z]/.test(value); // must contain capital and small letter
        const hasSpecial = /[^A-Za-z0-9]/.test(value); // must contain special character
        const hasNumber = /[0-9]/.test(value); // must contain number
        const hasLength = value.length >= 8; // must be at least 8 characters

        // reset bar and text before applying new state
        strengthBar.style.width = '0%';
        strengthBar.className = '';
        strengthText.textContent = '';

        // if password field is empty, hide error and bar while typing
        if (!value) {
            passwordContainer.classList.remove('error', 'password-rule-error');
            return;
        }

        // show password feedback in the same place as error message
        passwordContainer.classList.add('error', 'password-rule-error');

        // first condition: capital + small letter
        if (!hasUpperLower) {
            strengthBar.style.width = '25%';
            strengthBar.className = 'strength-weak';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على حروف كبيرة وصغيرة';
            strengthText.style.color = '#ff4d4f';
            return;
        }

        // second condition: special character
        if (!hasSpecial) {
            strengthBar.style.width = '50%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رمز خاص';
            strengthText.style.color = '#f4b400';
            return;
        }

        // third condition: number
        if (!hasNumber) {
            strengthBar.style.width = '75%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رقم';
            strengthText.style.color = '#f4b400';
            return;
        }

        // fourth condition: minimum length 8
        if (!hasLength) {
            strengthBar.style.width = '90%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تتكون كلمة المرور من 8 أحرف على الأقل';
            strengthText.style.color = '#f4b400';
            return;
        }

        // if all conditions are true, show strong password
        strengthBar.style.width = '100%';
        strengthBar.className = 'strength-strong';
        strengthText.textContent = 'كلمة المرور قوية';
        strengthText.style.color = '#34a853';

        // remove error style after short delay
        setTimeout(() => {
            passwordContainer.classList.remove('error', 'password-rule-error');
        }, 500);
    });

    
    // confirm password clear
    confirmPasswordInput.addEventListener('input', () => {
        // remove error style when user starts typing again
        confirmPasswordContainer.classList.remove('error');
    });

    // form submit validation
    form.addEventListener('submit', function (e) {
        // stop page reload
        e.preventDefault();

        // flag to track if any validation error exists
        let hasError = false;

        // get all entered values
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // check password conditions again on submit
        const hasUpperLower = /[A-Z]/.test(password) && /[a-z]/.test(password);
        const hasSpecial = /[^A-Za-z0-9]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasLength = password.length >= 8;

        // validate name
        if (!name) {
            nameContainer.classList.add('error');
            hasError = true;
        } else {
            nameContainer.classList.remove('error');
        }

        // validate email
        if (!email) {
            emailContainer.classList.add('error');
            emailContainer.querySelector('.error-text').textContent =
                'البريد الإلكتروني مطلوب';
            hasError = true;
        } else if (!emailPattern.test(email)) {
            emailContainer.classList.add('error');
            emailContainer.querySelector('.error-text').textContent =
                'صيغة البريد الإلكتروني غير صحيحة';
            hasError = true;
        } else {
            emailContainer.classList.remove('error');
        }

        // validate password
        if (!password.trim()) {
            // password field is empty
            passwordContainer.classList.add('error');
            passwordContainer.classList.remove('password-rule-error');
            hasError = true;
        } else if (!hasUpperLower) {
            // missing capital or small letters
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '25%';
            strengthBar.className = 'strength-weak';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على حروف كبيرة وصغيرة';
            strengthText.style.color = '#ff4d4f';
            hasError = true;
        } else if (!hasSpecial) {
            // missing special character
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '50%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رمز خاص';
            strengthText.style.color = '#f4b400';
            hasError = true;
        } else if (!hasNumber) {
            // missing number
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '75%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رقم';
            strengthText.style.color = '#f4b400';
            hasError = true;
        } else if (!hasLength) {
            // password length is less than 8
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '90%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تتكون كلمة المرور من 8 أحرف على الأقل';
            strengthText.style.color = '#f4b400';
            hasError = true;
        } else {
            // password is valid
            passwordContainer.classList.remove('error', 'password-rule-error');
        }

        // validate confirm password
        if (!confirmPassword.trim()) {
            // confirm password is empty
            confirmPasswordContainer.classList.add('error');
            confirmPasswordContainer.querySelector('.error-text').textContent =
                'فضلًا أدخل كلمة المرور للمتابعة.';
            hasError = true;
        } else if (password !== confirmPassword) {
            // passwords do not match
            confirmPasswordContainer.classList.add('error');
            confirmPasswordContainer.querySelector('.error-text').textContent =
                'كلمتا المرور غير متطابقتين';
            hasError = true;
        } else {
            // confirm password is correct
            confirmPasswordContainer.classList.remove('error');
        }

        // stop signup if any error exists
        if (hasError) return;

        // create simple user object
        const user = {
            name: name,
            email: email
        };

        // save user data in localStorage
        localStorage.setItem('currentUser', JSON.stringify(user));

        // redirect user to home page after successful signup
        window.location.href = 'home-page.html';
    });


</script>


</body>
</html>
