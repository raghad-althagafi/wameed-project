<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- the width of page match the width of the device, initial scale of page when its loading -->
    <link rel="stylesheet" href="../css/wameed.css"> <!-- import shared css file -->
    <title>إنشاء حساب</title>
    
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'YearOfTheCamel', sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            position: relative;
            color: #333;
        }

        /* back button */
        .back-button {
            position: absolute;
            top: 55px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        /* move button slightly when hovering */
        .back-button:hover {
            transform: translateX(-5px);
        }

        /* back con inside button */
        .back-icon {
            width: 60px;
            height: 60px;
        }

        /* logo */
        .logo-container {
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* main image */
        .logo-image {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        /* text logo */
        .text-logo {
            width: 220px;      
            height: auto;      
            margin-top: -6px;  
        }

        /* sign up card */
        .signup-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.08);
            padding: 50px 60px;
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            margin-top: 8px;
            margin-bottom: 60px;
        }

        /* card title */
        .signup-title {
            font-size: 40px;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 45px;
            font-weight: 500;
        }

        /* form */
        .form-container {
            margin-bottom: 28px;
            text-align: right;
        }

        /* labels */
        .form-label {
            display: block;
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* input wrapper */
        .input-container {
            position: relative;
        }

        /* input icon */
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* input field */
        .form-input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background: #f5f5f5;
            direction: rtl;
            text-align: right;
            outline: none;
        }

        /* input focus effect */
        .form-input:focus {
            background: #efefef;
        }

        /* sign up button */
        .signup-button {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* hover animation */
        .signin-button:hover {
            background-color: #d14d28;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(232, 93, 51, 0.3);
        }

        /* sign in link */
        .signin-link {
            text-align: center;
            margin-top: 28px;
            font-size: 15px;
            color: #888;
        }

        .signin-link a {
            color: #d4704a;
            text-decoration: none;
            font-weight: 600;
        }

        /* error message */
        .error-text {
            display: none;
            margin-top: 8px;
            font-size: 14px;
            color: #ff4d4f;
        }

        /* when container has error class a red input appear */
        .form-container.error .form-input {
            border: 1px solid #ff4d4f;
            background: #fff;
        }

        /* show error message when error occur */
        .form-container.error .error-text {
            display: block;
        }

        /* password strength container */
        .password-strength {
            display: none;
            margin-top: 8px;
        }

        /* bar background */
        .strength-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        /* moving colored bar */
        .strength-bar span {
            display: block;
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        /* weak password color */
        .strength-weak {
            background: #ff4d4f;
        }

        /* medium password color */
        .strength-medium {
            background: #f4b400;
        }

        /* strong password color */
        .strength-strong {
            background: #34a853;
        }

        /* hide the normal error text when showing password rules */
        .form-container.password-rule-error .error-text {
            display: none;
        }

        /* show password strength section when password rules are not complete */
        .form-container.password-rule-error .password-strength {
            display: block;
        }

        /* popup overlay */
        .custom-popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        /* show popup */
        .custom-popup-overlay.show {
            display: flex;
        }

        /* popup box */
        .custom-popup-box {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 22px;
            padding: 30px 26px 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            text-align: center;
            animation: popupFadeIn 0.25s ease;
        }

        /* title */
        .custom-popup-title {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* message */
        .custom-popup-message {
            font-size: 19px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 24px;
        }

        /* button */
        .custom-popup-button {
            min-width: 120px;
            padding: 12px 22px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .custom-popup-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        /* animation */
        @keyframes popupFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }       
    </style>
</head>
<body>

    <!-- back icon -->
    <a href="home-page.html">
        <button class="back-button" title="العودة">
            <img  class="back-icon" src="../assets/images/back-icon.svg" alt="العودة">
        </button>
    </a>
    

   <div class="logo-container">
        <!-- logo -->
        <img class="logo-image" src="../assets/images/logo.png" alt="وميض">  
        <!-- name -->
        <img class="text-logo" src="../assets/images/text logo.svg" alt="wameed logo" >
    </div>

    <div class="signup-card">
        <h2 class="signup-title">إنشاء حساب</h2>
        
        <form id="signupForm">
            <!-- name -->
            <div class="form-container">
                <label class="form-label">الاسم</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/user-icon.svg" alt="المستخدم">
                    <input type="text" class="form-input" placeholder="الاسم الكامل" id="name">
                </div>
                <small class="error-text">فضلًا أدخل اسمك للمتابعة.</small>
            </div>

            <!-- email -->
            <div class="form-container">
                <label class="form-label">البريد الإلكتروني</label>
                <div class="input-container"> 
                    <img class="input-icon" src="../assets/images/email-icon.svg" alt="الايميل">
                    <input type="email" class="form-input" placeholder="مثال: example@gmail.com" id="email">
                </div>
                <small class="error-text">البريد الإلكتروني مطلوب</small>
            </div>

            <!-- password -->
            <div class="form-container" id="passwordContainer">
                <label class="form-label">كلمة المرور</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/pass-icon.svg" alt="الباسوورد">
                    <input type="password" class="form-input" placeholder="كلمة المرور" id="password">
                </div>
                <!-- password validation -->
                <div class="password-strength">
                    <div class="strength-bar">
                        <span></span>
                    </div>
                    <small class="strength-text"></small>
                </div>
                <small class="error-text">فضلًا أدخل كلمة المرور للمتابعة.</small>
            </div>

            <!-- password -->
            <div class="form-container">
                <label class="form-label">تأكيد كلمة المرور</label>
                <div class="input-container">
                    <img class="input-icon" src="../assets/images/pass-icon.svg" alt="الباسوورد">
                    <input type="password" class="form-input" placeholder="تأكيد كلمة المرور" id="confirmPassword">
                </div>
                <small class="error-text">فضلًا أدخل كلمة المرور للمتابعة.</small>               
            </div>

            <!-- sign up button-->
            <button type="submit" class="signup-button">إنشاء الحساب</button>

            <!-- sign in link -->
            <div class="signin-link">
                لديك حساب بالفعل؟ <a href="sign-in.html">تسجيل الدخول</a>
            </div>
        </form>
    </div>

    <!-- pop up menu to show sign-in and forgot-password messages -->
    <div id="customPopup" class="custom-popup-overlay">
    <div class="custom-popup-box">
        <h3 id="customPopupTitle" class="custom-popup-title">تنبيه</h3>
        <p id="customPopupMessage" class="custom-popup-message"></p>
        <button id="customPopupBtn" class="custom-popup-button">حسنًا</button>
    </div>
</div>
    
<script type="module">
    // import the sign-in function and forgot-password function from auth.js
    import { signupWithEmail } from "../js/auth.js";

    // get the form element
    const form = document.getElementById('signupForm');

    // get all input fields
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');

    // get each input container to show or remove error styles
    const emailContainer = emailInput.closest('.form-container');
    const passwordContainer = document.getElementById('passwordContainer');
    const confirmPasswordContainer = confirmPasswordInput.closest('.form-container');
    const nameContainer = nameInput.closest('.form-container');

    // get password strength bar and text
    const strengthBar = passwordContainer.querySelector('.strength-bar span');
    const strengthText = passwordContainer.querySelector('.strength-text');

    // regex pattern for validating email format
    const emailPattern = /^(?!.*\.\.)([A-Za-z0-9._%+-]+)@([A-Za-z0-9-]+)\.([A-Za-z]{2,})(\.[A-Za-z]{2,})*$/;

    // email live validation
    emailInput.addEventListener('input', function () {
        // get email value without spaces at beginning or end
        const value = emailInput.value.trim();

        // if field is empty, remove error while typing
        if (!value) {
            emailContainer.classList.remove('error');
            return;
        }

        // if email format is wrong, show error message
        if (!emailPattern.test(value)) {
            emailContainer.classList.add('error');
            emailContainer.querySelector('.error-text').textContent =
                'صيغة البريد الإلكتروني غير صحيحة';
        } else {
            // remove error if email becomes valid
            emailContainer.classList.remove('error');
        }
    });

    
    // password validation
    passwordInput.addEventListener('input', function () {
        // get password value without outside spaces
        const value = passwordInput.value.trim();

        // check password conditions
        const hasUpperLower = /[A-Z]/.test(value) && /[a-z]/.test(value); // must contain capital and small letter
        const hasSpecial = /[^A-Za-z0-9]/.test(value); // must contain special character
        const hasNumber = /[0-9]/.test(value); // must contain number
        const hasLength = value.length >= 8; // must be at least 8 characters

        // reset bar and text before applying new state
        strengthBar.style.width = '0%';
        strengthBar.className = '';
        strengthText.textContent = '';

        // if password field is empty, hide error and bar while typing
        if (!value) {
            passwordContainer.classList.remove('error', 'password-rule-error');
            return;
        }

        // show password feedback in the same place as error message
        passwordContainer.classList.add('error', 'password-rule-error');

        // first condition: capital + small letter
        if (!hasUpperLower) {
            strengthBar.style.width = '25%';
            strengthBar.className = 'strength-weak';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على حروف كبيرة وصغيرة';
            strengthText.style.color = '#ff4d4f';
            return;
        }

        // second condition: special character
        if (!hasSpecial) {
            strengthBar.style.width = '50%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رمز خاص';
            strengthText.style.color = '#f4b400';
            return;
        }

        // third condition: number
        if (!hasNumber) {
            strengthBar.style.width = '75%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رقم';
            strengthText.style.color = '#f4b400';
            return;
        }

        // fourth condition: minimum length 8
        if (!hasLength) {
            strengthBar.style.width = '90%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تتكون كلمة المرور من 8 أحرف على الأقل';
            strengthText.style.color = '#f4b400';
            return;
        }

        // if all conditions are true, show strong password
        strengthBar.style.width = '100%';
        strengthBar.className = 'strength-strong';
        strengthText.textContent = 'كلمة المرور قوية';
        strengthText.style.color = '#34a853';

        // remove error style after short delay
        setTimeout(() => {
            passwordContainer.classList.remove('error', 'password-rule-error');
        }, 500);
    });

    
    // confirm password clear
    confirmPasswordInput.addEventListener('input', () => {
        // remove error style when user starts typing again
        confirmPasswordContainer.classList.remove('error');
    });

    // get the elemeents
    const customPopup = document.getElementById('customPopup');
    const customPopupTitle = document.getElementById('customPopupTitle');
    const customPopupMessage = document.getElementById('customPopupMessage');
    const customPopupBtn = document.getElementById('customPopupBtn');

    // function to show the popup with a custom title and message
    function showPopup(title, message, onClose = null) {
        // set the title and messaage
        customPopupTitle.textContent = title;
        customPopupMessage.textContent = message;
        customPopup.classList.add('show'); // show the popup

        // when the button clicked
        const closeHandler = () => {
            customPopup.classList.remove('show'); // hide the popup
            customPopupBtn.removeEventListener('click', closeHandler); // to avoid duplicate listeners
            if (onClose) onClose(); // run extra action after closing
        };
        // add click event to button
        customPopupBtn.addEventListener('click', closeHandler);
    }

    // form submit validation
    form.addEventListener('submit', async function (e) {
        // stop page reload
        e.preventDefault();

        // flag to track if any validation error exists
        let hasError = false;

        // get all entered values
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // check password conditions again on submit
        const hasUpperLower = /[A-Z]/.test(password) && /[a-z]/.test(password);
        const hasSpecial = /[^A-Za-z0-9]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasLength = password.length >= 8;

        // validate name
        if (!name) {
            nameContainer.classList.add('error');
            hasError = true;
        } else {
            nameContainer.classList.remove('error');
        }

        // validate email
        if (!email) {
            emailContainer.classList.add('error');
            emailContainer.querySelector('.error-text').textContent =
                'البريد الإلكتروني مطلوب';
            hasError = true;
        } else if (!emailPattern.test(email)) {
            emailContainer.classList.add('error');
            emailContainer.querySelector('.error-text').textContent =
                'صيغة البريد الإلكتروني غير صحيحة';
            hasError = true;
        } else {
            emailContainer.classList.remove('error');
        }

        // validate password
        if (!password.trim()) {
            // password field is empty
            passwordContainer.classList.add('error');
            passwordContainer.classList.remove('password-rule-error');
            hasError = true;
        } else if (!hasUpperLower) {
            // missing capital or small letters
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '25%';
            strengthBar.className = 'strength-weak';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على حروف كبيرة وصغيرة';
            strengthText.style.color = '#ff4d4f';
            hasError = true;
        } else if (!hasSpecial) {
            // missing special character
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '50%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رمز خاص';
            strengthText.style.color = '#f4b400';
            hasError = true;
        } else if (!hasNumber) {
            // missing number
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '75%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تحتوي كلمة المرور على رقم';
            strengthText.style.color = '#f4b400';
            hasError = true;
        } else if (!hasLength) {
            // password length is less than 8
            passwordContainer.classList.add('error', 'password-rule-error');
            strengthBar.style.width = '90%';
            strengthBar.className = 'strength-medium';
            strengthText.textContent = 'يجب أن تتكون كلمة المرور من 8 أحرف على الأقل';
            strengthText.style.color = '#f4b400';
            hasError = true;
        } else {
            // password is valid
            passwordContainer.classList.remove('error', 'password-rule-error');
        }

        // validate confirm password
        if (!confirmPassword.trim()) {
            // confirm password is empty
            confirmPasswordContainer.classList.add('error');
            confirmPasswordContainer.querySelector('.error-text').textContent =
                'فضلًا أدخل كلمة المرور للمتابعة.';
            hasError = true;
        } else if (password !== confirmPassword) {
            // passwords do not match
            confirmPasswordContainer.classList.add('error');
            confirmPasswordContainer.querySelector('.error-text').textContent =
                'كلمتا المرور غير متطابقتين';
            hasError = true;
        } else {
            // confirm password is correct
            confirmPasswordContainer.classList.remove('error');
        }

        // stop signup if any error exists
        if (hasError) return;

        try {
            // create new account with username, email and password
            const result = await signupWithEmail(name, email, password);

            // if verification email was sent
            if (result.verificationEmailSent) {
                showPopup(
                    'تم بنجاح',
                    'تم إنشاء الحساب بنجاح. تم إرسال رسالة تحقق إلى البريد الإلكتروني. يرجى التحقق من البريد الوارد أو الرسائل غير المرغوب فيها.',
                    () => {
                        // go to sign in page after closing popup
                        window.location.href = 'sign-in.html';
                    }
                );
            } else {
                showPopup(
                    // if account was created but verification email was not confirmed
                    'تم إنشاء الحساب',
                    'تم إنشاء الحساب بنجاح، لكن تعذر التأكد من إرسال رسالة التحقق الآن.',
                    () => {
                        // go to sign in page after closing popup
                        window.location.href = 'sign-in.html';
                    }
                );
            }

            } catch (error) {
                // email already used
                if (error.message.includes('auth/email-already-in-use')) {
                    showPopup('خطأ', 'هذا البريد الإلكتروني مستخدم مسبقًا.');
                // invalid email
                } else if (error.message.includes('auth/invalid-email')) {
                    showPopup('خطأ', 'البريد الإلكتروني غير صالح.');
                // weak password
                } else if (error.message.includes('auth/weak-password')) {
                    showPopup('خطأ', 'كلمة المرور ضعيفة.');
                } else {
                    showPopup('خطأ', error.message || 'حدث خطأ أثناء إنشاء الحساب');
                }
            }
    });


</script>


</body>
</html>
